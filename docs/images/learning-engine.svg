<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .bg { fill: #FAFAF8; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .section { font-size: 10px; font-weight: 600; fill: #888780; letter-spacing: 1.5px; }
  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  .rel { font-size: 11px; font-style: italic; fill: #888780; }

  .c-pink > rect { fill: #F4C0D1; stroke: #D4537E; stroke-width: 1; }
  .c-pink > .th { fill: #4B1528; } .c-pink > .ts { fill: #993556; }
  .c-purple > rect { fill: #CECBF6; stroke: #7F77DD; stroke-width: 1; }
  .c-purple > .th { fill: #26215C; } .c-purple > .ts { fill: #534AB7; }
  .c-gray > rect { fill: #D3D1C7; stroke: #888780; stroke-width: 1; }
  .c-gray > .th { fill: #2C2C2A; } .c-gray > .ts { fill: #5F5E5A; }

  @media (prefers-color-scheme: dark) {
    .bg { fill: #1a1a18; }
    .th { fill: #D3D1C7; } .ts { fill: #888780; } .section { fill: #5F5E5A; }
    .arr { stroke: #5F5E5A; } .rel { fill: #5F5E5A; }
    .c-pink > rect { fill: #4B1528; stroke: #ED93B1; }
    .c-pink > .th { fill: #F4C0D1; } .c-pink > .ts { fill: #ED93B1; }
    .c-purple > rect { fill: #26215C; stroke: #AFA9EC; }
    .c-purple > .th { fill: #CECBF6; } .c-purple > .ts { fill: #AFA9EC; }
    .c-gray > rect { fill: #2C2C2A; stroke: #5F5E5A; }
    .c-gray > .th { fill: #D3D1C7; } .c-gray > .ts { fill: #888780; }
  }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect class="bg" width="720" height="460" rx="16"/>

<text class="section" x="360" y="34" text-anchor="middle">LEARNING ENGINE — COGNITIVE SIGNAL PIPELINE</text>

<g class="c-pink"><rect x="240" y="50" width="240" height="56" rx="8"/><text class="th" x="360" y="70" text-anchor="middle" dominant-baseline="central">Session</text><text class="ts" x="360" y="88" text-anchor="middle" dominant-baseline="central">Timed learning block</text></g>

<line x1="300" y1="106" x2="200" y2="146" class="arr" marker-end="url(#arrow)"/>
<line x1="420" y1="106" x2="520" y2="146" class="arr" marker-end="url(#arrow)"/>

<g class="c-pink"><rect x="110" y="150" width="180" height="56" rx="8"/><text class="th" x="200" y="170" text-anchor="middle" dominant-baseline="central">Attempt</text><text class="ts" x="200" y="188" text-anchor="middle" dominant-baseline="central">One item, one try</text></g>
<g class="c-pink"><rect x="430" y="150" width="180" height="56" rx="8"/><text class="th" x="520" y="170" text-anchor="middle" dominant-baseline="central">Attempt</text><text class="ts" x="520" y="188" text-anchor="middle" dominant-baseline="central">One item, one try</text></g>

<text class="rel" x="360" y="182" text-anchor="middle">1 : N</text>

<line x1="200" y1="206" x2="200" y2="260" class="arr" marker-end="url(#arrow)"/>
<line x1="520" y1="206" x2="520" y2="260" class="arr" marker-end="url(#arrow)"/>

<text class="section" x="360" y="254" text-anchor="middle">OBSERVATIONS (PER CONCEPT)</text>

<g class="c-purple"><rect x="56" y="268" width="140" height="56" rx="8"/><text class="th" x="126" y="288" text-anchor="middle" dominant-baseline="central">Weakness</text><text class="ts" x="126" y="306" text-anchor="middle" dominant-baseline="central">Concept gap found</text></g>
<g class="c-purple"><rect x="212" y="268" width="140" height="56" rx="8"/><text class="th" x="282" y="288" text-anchor="middle" dominant-baseline="central">Improvement</text><text class="ts" x="282" y="306" text-anchor="middle" dominant-baseline="central">Visible progress</text></g>
<g class="c-purple"><rect x="368" y="268" width="140" height="56" rx="8"/><text class="th" x="438" y="288" text-anchor="middle" dominant-baseline="central">Mastery</text><text class="ts" x="438" y="306" text-anchor="middle" dominant-baseline="central">Fluent application</text></g>
<g class="c-gray"><rect x="524" y="268" width="140" height="56" rx="8"/><text class="th" x="594" y="288" text-anchor="middle" dominant-baseline="central">Confidence</text><text class="ts" x="594" y="306" text-anchor="middle" dominant-baseline="central">High / low gate</text></g>

<line x1="200" y1="324" x2="200" y2="374" class="arr" marker-end="url(#arrow)"/>
<line x1="510" y1="324" x2="510" y2="374" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="90" y="378" width="220" height="56" rx="8"/><text class="th" x="200" y="398" text-anchor="middle" dominant-baseline="central">Concept mastery map</text><text class="ts" x="200" y="416" text-anchor="middle" dominant-baseline="central">Per-concept strength over time</text></g>
<g class="c-gray"><rect x="400" y="378" width="220" height="56" rx="8"/><text class="th" x="510" y="398" text-anchor="middle" dominant-baseline="central">FSRS review cards</text><text class="ts" x="510" y="416" text-anchor="middle" dominant-baseline="central">Spaced retrieval schedule</text></g>
</svg>
