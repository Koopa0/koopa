<line x1="360" y1="218" x2="360" y2="258" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="160" y="262" width="400" height="48" rx="8"/><text class="th" x="360" y="282" text-anchor="middle" dominant-baseline="central">MCP server</text><text class="ts" x="360" y="300" text-anchor="middle" dominant-baseline="central">23 workflow-driven tools</text></g>

<line x1="220" y1="310" x2="140" y2="362" class="arr" marker-end="url(#arrow)"/>
<line x1="360" y1="310" x2="360" y2="362" class="arr" marker-end="url(#arrow)"/>
<line x1="500" y1="310" x2="580" y2="362" class="arr" marker-end="url(#arrow)"/>

