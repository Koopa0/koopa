<g class="c-gray"><rect x="284" y="404" width="70" height="32" rx="4"/><text class="ts" x="319" y="422" text-anchor="middle" dominant-baseline="central">Public</text></g>
<g class="c-gray"><rect x="366" y="404" width="70" height="32" rx="4"/><text class="ts" x="401" y="422" text-anchor="middle" dominant-baseline="central">Admin</text></g>

