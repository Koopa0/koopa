<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <filter id="sh" x="-4%" y="-8%" width="108%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="600" height="80" fill="transparent"/>

  <!-- Draft -->
  <g filter="url(#sh)">
    <rect x="0" y="16" width="96" height="40" rx="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="48" y="41" text-anchor="middle" font-size="12" font-weight="500" fill="#92400e">draft</text>
  </g>

  <line x1="96" y1="36" x2="142" y2="36" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Review -->
  <g filter="url(#sh)">
    <rect x="146" y="16" width="96" height="40" rx="20" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="194" y="41" text-anchor="middle" font-size="12" font-weight="500" fill="#1e40af">review</text>
  </g>

  <line x1="242" y1="36" x2="288" y2="36" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Published -->
  <g filter="url(#sh)">
    <rect x="292" y="16" width="110" height="40" rx="20" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
    <text x="347" y="41" text-anchor="middle" font-size="12" font-weight="500" fill="#166534">published</text>
  </g>

  <line x1="402" y1="36" x2="448" y2="36" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Archived -->
  <g filter="url(#sh)">
    <rect x="452" y="16" width="104" height="40" rx="20" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="504" y="41" text-anchor="middle" font-size="12" font-weight="500" fill="#64748b">archived</text>
  </g>

  <!-- Private toggle -->
  <path d="M 347 56 Q 347 72 370 72 L 380 72" stroke="#94a3b8" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
  <text x="384" y="76" font-size="10" fill="#94a3b8">↻ public / private</text>
</svg>