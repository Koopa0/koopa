<svg viewBox="0 0 720 350" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .bg { fill: #FAFAF8; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; }
  .c-blue > rect { fill: #B5D4F4; stroke: #378ADD; stroke-width: 1; }
  .c-blue > .th { fill: #042C53; } .c-blue > .ts { fill: #185FA5; }
  .c-gray > rect { fill: #D3D1C7; stroke: #888780; stroke-width: 1; }
  .c-gray > .th { fill: #2C2C2A; } .c-gray > .ts { fill: #5F5E5A; }
  @media (prefers-color-scheme: dark) {
    .bg { fill: #1a1a18; }
    .th { fill: #D3D1C7; } .ts { fill: #888780; }
    .arr { stroke: #5F5E5A; }
    .c-blue > rect { fill: #042C53; stroke: #85B7EB; }
    .c-blue > .th { fill: #B5D4F4; } .c-blue > .ts { fill: #85B7EB; }
    .c-gray > rect { fill: #2C2C2A; stroke: #5F5E5A; }
    .c-gray > .th { fill: #D3D1C7; } .c-gray > .ts { fill: #888780; }
  }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect class="bg" width="720" height="350" rx="16"/>

<text class="ts" x="120" y="36" text-anchor="middle">Input</text>
<text class="ts" x="360" y="36" text-anchor="middle">Processing</text>
<text class="ts" x="590" y="36" text-anchor="middle">Output</text>

<g class="c-gray"><rect x="50" y="50" width="140" height="44" rx="8"/>
  <text class="th" x="120" y="66" text-anchor="middle" dominant-baseline="central">Obsidian vault</text>
  <text class="ts" x="120" y="82" text-anchor="middle" dominant-baseline="central">Git push → webhook</text></g>
<line x1="190" y1="72" x2="260" y2="72" class="arr" marker-end="url(#arrow)"/>
<g class="c-blue"><rect x="264" y="50" width="192" height="44" rx="8"/>
  <text class="th" x="360" y="66" text-anchor="middle" dominant-baseline="central">AI tag + embed</text>
  <text class="ts" x="360" y="82" text-anchor="middle" dominant-baseline="central">Review pipeline</text></g>
<line x1="456" y1="72" x2="516" y2="72" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="520" y="50" width="140" height="44" rx="8"/>
  <text class="th" x="590" y="66" text-anchor="middle" dominant-baseline="central">Articles · TILs</text>
  <text class="ts" x="590" y="82" text-anchor="middle" dominant-baseline="central">Notes · essays</text></g>

<g class="c-gray"><rect x="50" y="120" width="140" height="44" rx="8"/>
  <text class="th" x="120" y="136" text-anchor="middle" dominant-baseline="central">RSS feeds</text>
  <text class="ts" x="120" y="152" text-anchor="middle" dominant-baseline="central">20 feeds · scheduled</text></g>
<line x1="190" y1="142" x2="260" y2="142" class="arr" marker-end="url(#arrow)"/>
<g class="c-blue"><rect x="264" y="120" width="192" height="44" rx="8"/>
  <text class="th" x="360" y="136" text-anchor="middle" dominant-baseline="central">Relevance score</text>
  <text class="ts" x="360" y="152" text-anchor="middle" dominant-baseline="central">Curate · ignore · feedback</text></g>
<line x1="456" y1="142" x2="516" y2="142" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="520" y="120" width="140" height="44" rx="8"/>
  <text class="th" x="590" y="136" text-anchor="middle" dominant-baseline="central">Bookmarks</text>
  <text class="ts" x="590" y="152" text-anchor="middle" dominant-baseline="central">Digests</text></g>

<g class="c-gray"><rect x="50" y="190" width="140" height="44" rx="8"/>
  <text class="th" x="120" y="206" text-anchor="middle" dominant-baseline="central">Notion</text>
  <text class="ts" x="120" y="222" text-anchor="middle" dominant-baseline="central">Webhook · cron</text></g>
<line x1="190" y1="212" x2="260" y2="212" class="arr" marker-end="url(#arrow)"/>
<g class="c-blue"><rect x="264" y="190" width="192" height="44" rx="8"/>
  <text class="th" x="360" y="206" text-anchor="middle" dominant-baseline="central">Role-based routing</text>
  <text class="ts" x="360" y="222" text-anchor="middle" dominant-baseline="central">Bidirectional sync</text></g>
<line x1="456" y1="212" x2="516" y2="212" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="520" y="190" width="140" height="44" rx="8"/>
  <text class="th" x="590" y="206" text-anchor="middle" dominant-baseline="central">Tasks · goals</text>
  <text class="ts" x="590" y="222" text-anchor="middle" dominant-baseline="central">Projects</text></g>

<g class="c-gray"><rect x="50" y="260" width="140" height="44" rx="8"/>
  <text class="th" x="120" y="276" text-anchor="middle" dominant-baseline="central">Manual writing</text>
  <text class="ts" x="120" y="292" text-anchor="middle" dominant-baseline="central">Editor · MCP tools</text></g>
<line x1="190" y1="282" x2="260" y2="282" class="arr" marker-end="url(#arrow)"/>
<g class="c-blue"><rect x="264" y="260" width="192" height="44" rx="8"/>
  <text class="th" x="360" y="276" text-anchor="middle" dominant-baseline="central">AI polish + tag</text>
  <text class="ts" x="360" y="292" text-anchor="middle" dominant-baseline="central">Semantic search</text></g>
<line x1="456" y1="282" x2="516" y2="282" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="520" y="260" width="140" height="44" rx="8"/>
  <text class="th" x="590" y="276" text-anchor="middle" dominant-baseline="central">Published content</text>
  <text class="ts" x="590" y="292" text-anchor="middle" dominant-baseline="central">7 types → website</text></g>

<text class="ts" x="360" y="330" text-anchor="middle">All flows converge in PostgreSQL — full-text + semantic search via RRF</text>
</svg>
