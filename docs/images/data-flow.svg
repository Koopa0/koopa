<svg viewBox="0 0 720 500" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .bg { fill: #FAFAF8; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
  .section { font-size: 10px; font-weight: 600; fill: #888780; letter-spacing: 1.5px; }
  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  .dash { stroke-dasharray: 4 3; }

  .c-teal > rect { fill: #9FE1CB; stroke: #1D9E75; stroke-width: 1; }
  .c-teal > .th { fill: #04342C; } .c-teal > .ts { fill: #0F6E56; }
  .c-blue > rect { fill: #B5D4F4; stroke: #378ADD; stroke-width: 1; }
  .c-blue > .th { fill: #042C53; } .c-blue > .ts { fill: #185FA5; }
  .c-gray > rect { fill: #D3D1C7; stroke: #888780; stroke-width: 1; }
  .c-gray > .th { fill: #2C2C2A; } .c-gray > .ts { fill: #5F5E5A; }

  @media (prefers-color-scheme: dark) {
    .bg { fill: #1a1a18; }
    .th { fill: #D3D1C7; } .ts { fill: #888780; } .section { fill: #5F5E5A; }
    .arr { stroke: #5F5E5A; }
    .c-teal > rect { fill: #04342C; stroke: #5DCAA5; }
    .c-teal > .th { fill: #9FE1CB; } .c-teal > .ts { fill: #5DCAA5; }
    .c-blue > rect { fill: #042C53; stroke: #85B7EB; }
    .c-blue > .th { fill: #B5D4F4; } .c-blue > .ts { fill: #85B7EB; }
    .c-gray > rect { fill: #2C2C2A; stroke: #5F5E5A; }
    .c-gray > .th { fill: #D3D1C7; } .c-gray > .ts { fill: #888780; }
  }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect class="bg" width="720" height="500" rx="16"/>

<!-- INPUT -->
<text class="section" x="60" y="34" text-anchor="start">INPUT</text>

<g class="c-teal"><rect x="50" y="46" width="110" height="44" rx="8"/><text class="th" x="105" y="68" text-anchor="middle" dominant-baseline="central">Obsidian</text></g>
<g class="c-teal"><rect x="176" y="46" width="100" height="44" rx="8"/><text class="th" x="226" y="68" text-anchor="middle" dominant-baseline="central">RSS feeds</text></g>
<g class="c-teal"><rect x="292" y="46" width="80" height="44" rx="8"/><text class="th" x="332" y="68" text-anchor="middle" dominant-baseline="central">Notion</text></g>
<g class="c-teal"><rect x="388" y="46" width="80" height="44" rx="8"/><text class="th" x="428" y="68" text-anchor="middle" dominant-baseline="central">GitHub</text></g>
<g class="c-teal"><rect x="484" y="46" width="186" height="44" rx="8"/><text class="th" x="577" y="68" text-anchor="middle" dominant-baseline="central">Claude via MCP</text></g>

<!-- Arrows down -->
<line x1="105" y1="90" x2="105" y2="138" class="arr" marker-end="url(#arrow)"/>
<line x1="226" y1="90" x2="226" y2="138" class="arr" marker-end="url(#arrow)"/>
<line x1="332" y1="90" x2="332" y2="138" class="arr" marker-end="url(#arrow)"/>
<line x1="428" y1="90" x2="428" y2="138" class="arr" marker-end="url(#arrow)"/>
<line x1="577" y1="90" x2="577" y2="138" class="arr" marker-end="url(#arrow)"/>

<!-- PROCESS -->
<text class="section" x="60" y="130" text-anchor="start">PROCESS</text>

<g class="c-blue"><rect x="50" y="142" width="620" height="180" rx="14"/><text class="th" x="360" y="166" text-anchor="middle" dominant-baseline="central">Knowledge engine (PostgreSQL + Genkit)</text></g>

<g class="c-blue"><rect x="72" y="184" width="120" height="56" rx="6"/><text class="th" x="132" y="204" text-anchor="middle" dominant-baseline="central">AI pipeline</text><text class="ts" x="132" y="222" text-anchor="middle" dominant-baseline="central">Classify · score</text></g>
<g class="c-blue"><rect x="208" y="184" width="120" height="56" rx="6"/><text class="th" x="268" y="204" text-anchor="middle" dominant-baseline="central">Tag engine</text><text class="ts" x="268" y="222" text-anchor="middle" dominant-baseline="central">Normalize · alias</text></g>
<g class="c-blue"><rect x="344" y="184" width="140" height="56" rx="6"/><text class="th" x="414" y="204" text-anchor="middle" dominant-baseline="central">Semantic search</text><text class="ts" x="414" y="222" text-anchor="middle" dominant-baseline="central">pgvector 768d</text></g>
<g class="c-blue"><rect x="500" y="184" width="150" height="56" rx="6"/><text class="th" x="575" y="204" text-anchor="middle" dominant-baseline="central">Learning engine</text><text class="ts" x="575" y="222" text-anchor="middle" dominant-baseline="central">FSRS · observations</text></g>

<line x1="192" y1="212" x2="206" y2="212" class="arr" marker-end="url(#arrow)"/>
<line x1="328" y1="212" x2="342" y2="212" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="130" y="260" width="160" height="44" rx="6"/><text class="th" x="210" y="282" text-anchor="middle" dominant-baseline="central">Knowledge graph</text></g>
<g class="c-blue"><rect x="340" y="260" width="200" height="44" rx="6"/><text class="th" x="440" y="282" text-anchor="middle" dominant-baseline="central">PARA + GTD task system</text></g>

<!-- Arrows down -->
<line x1="210" y1="322" x2="210" y2="372" class="arr" marker-end="url(#arrow)"/>
<line x1="440" y1="322" x2="440" y2="372" class="arr" marker-end="url(#arrow)"/>

<!-- OUTPUT -->
<text class="section" x="60" y="362" text-anchor="start">OUTPUT</text>

<g class="c-gray"><rect x="60" y="376" width="140" height="56" rx="8"/><text class="th" x="130" y="396" text-anchor="middle" dominant-baseline="central">Public website</text><text class="ts" x="130" y="414" text-anchor="middle" dominant-baseline="central">Articles · portfolio</text></g>
<g class="c-gray"><rect x="216" y="376" width="140" height="56" rx="8"/><text class="th" x="286" y="396" text-anchor="middle" dominant-baseline="central">Admin workspace</text><text class="ts" x="286" y="414" text-anchor="middle" dominant-baseline="central">Dashboard · inbox</text></g>
<g class="c-gray"><rect x="372" y="376" width="130" height="56" rx="8"/><text class="th" x="437" y="396" text-anchor="middle" dominant-baseline="central">AI queryable</text><text class="ts" x="437" y="414" text-anchor="middle" dominant-baseline="central">MCP search · recall</text></g>
<g class="c-gray"><rect x="518" y="376" width="140" height="56" rx="8"/><text class="th" x="588" y="396" text-anchor="middle" dominant-baseline="central">Spaced review</text><text class="ts" x="588" y="414" text-anchor="middle" dominant-baseline="central">FSRS scheduling</text></g>

<!-- Feedback loop -->
<path d="M658 404 L690 404 L690 68 L672 68" class="arr dash" marker-end="url(#arrow)"/>
<text class="ts" x="698" y="240" text-anchor="middle" transform="rotate(90,698,240)" style="font-size:10px">Feedback loop</text>
</svg>
