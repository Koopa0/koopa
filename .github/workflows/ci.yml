name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  # A main run carries the deploy job. Cancelling a run cancels every job in it,
  # so main runs must never be cancelled in flight — an interrupted deploy leaves
  # the VPS half-built. Pull request runs carry no deploy job and stay cancellable.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  go:
    name: Build / Vet / Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: deploy build identity contract
        run: python3 tests/deploy-build-identity.py

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      # Unit lane with the race detector (security.md mandates -race).
      # Integration tests (//go:build integration) run in the separate
      # `integration` job below — testcontainers needs a Docker daemon, which
      # this job's runner does not assume. This lane is NOT a full-system pass.
      - name: go test (race, unit)
        run: go test -race ./...

  integration:
    name: Integration (race, testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      # ubuntu-latest provides a Docker daemon; testcontainers-go starts a
      # pgvector/pgvector:pg17 container per package (internal/testdb) and
      # applies migrations/. Mirrors `make test-integration` locally, with
      # -count=1 to bypass the test cache so the integration suite always runs
      # against the current tree (the cache can mask a regression on re-runs).
      - name: go test (race, integration)
        run: go test -race -count=1 -tags integration ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: golangci/golangci-lint-action@v7
        with:
          # Pinned for reproducible lint results (was `latest`, non-reproducible).
          version: v2.12.2

  sqlc-drift:
    name: sqlc drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0

      - name: sqlc generate
        run: sqlc generate

      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- internal/db/; then
            echo "::error::sqlc generate produced changes. Run sqlc generate locally and commit the generated files."
            exit 1
          fi

  frontend:
    name: Frontend build + lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: npm run lint
        run: npm run lint

      - name: npm run build
        run: npm run build

  # Production deploy. `needs` lists every check job above, so a red check skips
  # the deploy; the `if` restricts it to a push landing on main (a pull_request
  # run never deploys). The condition uses no status check function, which keeps
  # the implicit success() gate on `needs` in force.
  deploy:
    name: Deploy to VPS
    needs: [go, integration, lint, sqlc-drift, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      # Deploys are mutually exclusive and are never interrupted: an aborted
      # `docker compose up` leaves the VPS serving a partially built stack.
      group: deploy
      cancel-in-progress: false
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Fail closed — appleboy/ssh-action has no script_stop equivalent,
            # so a failed fetch/reset must abort before docker compose runs.
            set -e
            cd ~/koopa0.dev
            DEPLOY_SHA="${{ github.sha }}"
            # fetch + hard reset instead of pull — deploy the exact revision
            # whose CI just passed (github.sha for this push), not whatever
            # origin/main points at now: a later push can advance main while
            # this deploy waits its turn in the deploy concurrency group. Reset
            # also survives force-push / history rewrites and never gets stuck
            # on a divergent branch.
            git fetch origin
            git reset --hard "$DEPLOY_SHA"
            CHECKED_OUT_SHA=$(git rev-parse HEAD)
            if [ "$CHECKED_OUT_SHA" != "$DEPLOY_SHA" ]; then
              echo "ERROR: checked-out SHA $CHECKED_OUT_SHA does not match deploy SHA $DEPLOY_SHA"
              exit 1
            fi

            # Compose forwards BUILD_SHA into both Dockerfiles. Export one
            # trigger-bound value so backend and MCP cannot be stamped from a
            # moving ref or from Docker's local-development fallback.
            export BUILD_SHA="$DEPLOY_SHA"

            # Silence Grafana alerts during deploy (5 min)
            export $(grep GRAFANA_ADMIN_PASSWORD ~/server/observability/.env)
            SILENCE_ID=$(curl -sf -X POST http://localhost:3000/api/alertmanager/grafana/api/v2/silences \
              -H "Authorization: Basic $(echo -n admin:${GRAFANA_ADMIN_PASSWORD} | base64)" \
              -H "Content-Type: application/json" \
              -d "{
                \"matchers\": [{\"name\": \"severity\", \"value\": \".*\", \"isRegex\": true}],
                \"startsAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
                \"endsAt\": \"$(date -u -d '+5 min' +%Y-%m-%dT%H:%M:%SZ)\",
                \"createdBy\": \"ci-cd\",
                \"comment\": \"Deploy silence\"
              }" 2>/dev/null | jq -r '.silenceID' 2>/dev/null) || true

            docker compose up -d --build
            docker image prune -f

            # Post-deploy health check
            echo "Waiting for services to be ready..."
            for svc in backend mcp; do
              case $svc in
                backend) endpoint="http://localhost:8080/healthz" ;;
                mcp)     endpoint="http://localhost:8081/healthz" ;;
              esac
              for i in $(seq 1 30); do
                if health_json=$(docker compose exec -T "$svc" wget -qO- "$endpoint" 2>/dev/null); then
                  if ! observed_sha=$(printf '%s' "$health_json" | jq -er \
                    'select(.status == "ok") | .build.sha | select(type == "string" and length > 0)'); then
                    echo "ERROR: $svc returned health JSON without status=ok and a build SHA"
                    docker compose logs "$svc" --tail 20
                    exit 1
                  fi
                  if [ "$observed_sha" != "$BUILD_SHA" ]; then
                    echo "ERROR: $svc reports build SHA $observed_sha; expected $BUILD_SHA"
                    docker compose logs "$svc" --tail 20
                    exit 1
                  fi
                  echo "$svc healthy at build $observed_sha after ${i}s"
                  break
                fi
                if [ "$i" -eq 30 ]; then
                  echo "ERROR: $svc failed health check after 30s"
                  docker compose logs "$svc" --tail 20
                  exit 1
                fi
                sleep 1
              done
            done

            # Expire silence early after deploy completes
            if [ -n "$SILENCE_ID" ] && [ "$SILENCE_ID" != "null" ]; then
              curl -sf -X DELETE "http://localhost:3000/api/alertmanager/grafana/api/v2/silence/${SILENCE_ID}" \
                -H "Authorization: Basic $(echo -n admin:${GRAFANA_ADMIN_PASSWORD} | base64)" 2>/dev/null || true
            fi
