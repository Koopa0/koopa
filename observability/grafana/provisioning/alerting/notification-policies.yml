apiVersion: 1

policies:
  - orgId: 1
    receiver: telegram-critical
    group_by: ["alertname", "severity"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: telegram-warning
        matchers:
          - severity = warning
        group_wait: 1m
        group_interval: 10m
        repeat_interval: 8h
        mute_time_intervals:
          - nighttime
      - receiver: telegram-critical
        matchers:
          - severity = critical
        group_wait: 10s
        group_interval: 1m
        repeat_interval: 1h

muteTimes:
  - orgId: 1
    name: nighttime
    time_intervals:
      - times:
          - start_time: "00:00"
            end_time: "08:00"
        location: "Asia/Taipei"
