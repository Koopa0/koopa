global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Go backend — 應用層 metrics（request rate, latency, error rate）
  - job_name: "blog-backend"
    static_configs:
      - targets: ["backend:8080"]
        labels:
          project: "blog"

  # Node Exporter — VPS 硬體指標（CPU, RAM, disk, network）
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Loki 自身 metrics（debug 用，可選）
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  # Alloy 自身 metrics（debug 用，可選）
  - job_name: "alloy"
    static_configs:
      - targets: ["alloy:12345"]
