<!doctype html>
<html lang="zh-TW" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <!-- Apply the persisted PUBLIC theme before first paint. The public site
         (.ed) defaults to warm paper; this adds `public-dark` synchronously when
         the visitor previously chose the dark twin, so SSR hydration never
         flashes. It also sets the ROOT color-scheme + background for the public
         surface so the viewport scrollbar and overscroll match the paper (admin
         paths keep the global oklch-dark root). -->
    <script>
      try {
        var html = document.documentElement;
        var admin = location.pathname.indexOf('/admin') === 0;
        var dark =
          !admin && localStorage.getItem('koopa-public-theme') === 'dark';
        if (dark) {
          html.classList.add('public-dark');
        }
        if (!admin) {
          html.style.colorScheme = dark ? 'dark' : 'light';
          html.style.background = dark ? '#14130f' : '#edeae2';
        }
      } catch (e) {
        /* storage unavailable — keep the paper default */
      }
    </script>
    <meta name="theme-color" content="#edeae2" />
    <title>Koopa | Software Engineer</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Koopa's portfolio — Software Engineer specializing in Golang, Angular, and cloud-native architectures."
    />
    <meta property="og:title" content="Koopa | Software Engineer" />
    <meta
      property="og:description"
      content="Software Engineer specializing in Golang, Angular, and cloud-native architectures."
    />
    <meta property="og:image" content="https://koopa0.dev/og-image.png" />
    <meta property="og:url" content="https://koopa0.dev" />
    <meta property="og:site_name" content="koopa0.dev" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Koopa012426" />
    <meta name="twitter:creator" content="@Koopa012426" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="Koopa's Blog RSS Feed"
      href="https://koopa0.dev/feed.xml"
    />
    <!-- Fonts are self-hosted via @fontsource-variable (imported in styles.css);
         no Google Fonts round-trip. -->
  </head>
  <body class="font-sans antialiased">
    <app-root></app-root>
  </body>
</html>
