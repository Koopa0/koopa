<section
  class="flex min-h-[calc(100vh-4rem)] items-center justify-center bg-zinc-950 px-4 py-12"
>
  <div class="w-full max-w-md">
    <!-- Logo & Title -->
    <div class="mb-8 text-center">
      <img
        src="/logo.png"
        alt="Koopa Logo"
        width="64"
        height="64"
        class="mx-auto mb-4 size-16"
      />
      <h1 class="text-2xl font-bold text-zinc-100">koopa0.dev</h1>
    </div>

    <!-- Login Card -->
    <div class="rounded-sm border border-zinc-800 bg-zinc-900/50 p-6">
      <!-- Error Message -->
      @if (errorMessage()) {
      <div
        class="mb-4 flex items-center gap-2 rounded-sm border border-red-900 bg-red-900/20 px-3 py-2 text-sm text-red-400"
      >
        <lucide-icon [img]="AlertCircleIcon" [size]="16" />
        {{ errorMessage() }}
      </div>
      }

      <!-- Google Sign In Button -->
      <button
        type="button"
        class="flex w-full items-center justify-center gap-3 rounded-sm border border-zinc-700 bg-zinc-800 px-4 py-3 text-sm font-medium text-zinc-100 transition-colors hover:border-zinc-600 hover:bg-zinc-700"
        (click)="signInWithGoogle()"
      >
        <svg class="size-5" viewBox="0 0 24 24">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
            fill="#4285F4"
          />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853"
          />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05"
          />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335"
          />
        </svg>
        Sign in with Google
      </button>

      <!-- Footer -->
      <div
        class="mt-6 flex items-center justify-between border-t border-zinc-800 pt-4"
      >
        <div class="flex items-center gap-1 text-xs text-zinc-500">
          <lucide-icon [img]="InfoIcon" [size]="12" />
          <span>Authorized accounts only</span>
        </div>
        <a
          routerLink="/"
          class="inline-flex items-center gap-1 text-xs text-zinc-400 no-underline transition-colors hover:text-zinc-200"
        >
          <lucide-icon [img]="HomeIcon" [size]="12" />
          Back to home
        </a>
      </div>
    </div>
  </div>
</section>
