<section class="ed-main pb-24">
  <div class="mx-auto max-w-(--ed-measure)">
    <!-- Intro -->
    <header class="pt-12 sm:pt-16">
      <h1
        class="font-display text-[2.5rem] leading-[1.08] font-bold tracking-[-0.025em] text-balance text-fg sm:text-[3rem]"
      >
        Notes, systems, and what I'm working out.
      </h1>
      <div class="mt-8 flex items-center gap-5">
        <a
          href="https://github.com/koopa0"
          target="_blank"
          rel="noopener noreferrer"
          class="text-fg-subtle transition-colors hover:text-brand"
          aria-label="GitHub"
        >
          <lucide-icon [img]="GithubIcon" [size]="20" [strokeWidth]="1.6" />
        </a>
        <a
          href="https://www.linkedin.com/in/koopa-chen-70a4651ba/"
          target="_blank"
          rel="noopener noreferrer"
          class="text-fg-subtle transition-colors hover:text-brand"
          aria-label="LinkedIn"
        >
          <lucide-icon [img]="LinkedinIcon" [size]="20" [strokeWidth]="1.6" />
        </a>
        <a
          href="https://x.com/Koopa012426"
          target="_blank"
          rel="noopener noreferrer"
          class="text-fg-subtle transition-colors hover:text-brand"
          aria-label="X"
        >
          <svg
            class="size-5"
            viewBox="0 0 24 24"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"
            />
          </svg>
        </a>
        <a
          href="mailto:contact@koopa0.dev"
          class="text-fg-subtle transition-colors hover:text-brand"
          aria-label="Email"
        >
          <lucide-icon [img]="MailIcon" [size]="20" [strokeWidth]="1.6" />
        </a>
      </div>
    </header>

    <!-- Recent writing -->
    <section class="mt-16 sm:mt-20">
      <div
        class="flex items-baseline justify-between border-b border-border pb-3"
      >
        <p class="font-mono text-[11px] tracking-[0.06em] text-brand uppercase">
          Recent
        </p>
        <a
          routerLink="/articles"
          class="group inline-flex items-center gap-1 text-sm text-fg-subtle transition-colors hover:text-fg"
          data-testid="read-everything"
        >
          Read everything
          <lucide-icon
            class="transition-transform group-hover:translate-x-0.5"
            [img]="ArrowRightIcon"
            [size]="14"
            [strokeWidth]="1.6"
          />
        </a>
      </div>

      @defer (hydrate on idle) {
        <ul class="mt-2 flex flex-col">
          @for (piece of recent(); track piece.id) {
            <li>
              <app-post-row [content]="piece" />
            </li>
          } @empty {
            <li
              class="py-12 text-center text-sm text-fg-faint"
              data-testid="recent-empty"
            >
              Nothing published yet.
            </li>
          }
        </ul>
      } @placeholder {
        <div class="min-h-[16rem]"></div>
      }
    </section>
  </div>
</section>
