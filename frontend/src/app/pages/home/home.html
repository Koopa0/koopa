<section class="ed-main pb-24">
  <div class="mx-auto max-w-(--ed-measure)">
    <!-- Intro -->
    <header class="pt-12 sm:pt-16">
      <h1
        class="font-display text-[2.5rem] leading-[1.08] font-bold tracking-[-0.025em] text-balance text-fg sm:text-[3rem]"
      >
        Notes, systems, and what I'm working out.
      </h1>
    </header>

    <!-- Recent writing -->
    <section class="mt-16 sm:mt-20">
      <div
        class="flex items-baseline justify-between border-b border-border pb-3"
      >
        <p class="font-mono text-[11px] tracking-[0.06em] text-brand uppercase">
          Recent
        </p>
        <a
          routerLink="/articles"
          class="group inline-flex items-center gap-1 text-sm text-fg-subtle transition-colors hover:text-fg"
          data-testid="read-everything"
        >
          Read everything
          <lucide-icon
            class="transition-transform group-hover:translate-x-0.5"
            [img]="ArrowRightIcon"
            [size]="14"
            [strokeWidth]="1.6"
          />
        </a>
      </div>

      @defer (on immediate; hydrate on idle) {
        <ul class="mt-2 flex flex-col">
          @for (piece of recent(); track piece.id; let i = $index) {
            <li class="ed-reveal" [style.animation-delay]="i * 45 + 'ms'">
              <app-post-row [content]="piece" [cta]="true" />
            </li>
          } @empty {
            <li
              class="py-12 text-center text-sm text-fg-faint"
              data-testid="recent-empty"
            >
              Nothing published yet.
            </li>
          }
        </ul>
      } @placeholder {
        <div class="min-h-[16rem]"></div>
      }
    </section>
  </div>
</section>
