<section>
  <div class="mx-auto max-w-3xl px-6 pt-11 pb-28 sm:px-11">
    <!-- Hero -->
    <header class="border-b border-border pt-2 pb-7">
      <p class="font-mono text-[11px] tracking-[0.06em] uppercase text-brand">
        Uses
      </p>
      <h1
        class="font-display mt-3 text-[2.375rem] font-bold leading-[1.1] tracking-[-0.025em] text-balance text-fg"
      >
        Tools of the trade
      </h1>
      <p
        class="mt-3.5 max-w-[620px] font-serif text-lg leading-[1.65] text-fg-muted"
      >
        Tools, hardware, and software I use daily.
      </p>
    </header>

    <div class="flex flex-col gap-10 pt-10">
      @for (cat of categories; track cat.title) {
        <section>
          <div class="mb-4 flex items-center gap-2">
            <lucide-icon [img]="cat.icon" [size]="18" class="text-fg-subtle" />
            <h2 class="font-display text-xl font-semibold text-fg">
              {{ cat.title }}
            </h2>
          </div>
          <div class="flex flex-col gap-3">
            @for (item of cat.items; track item.name) {
              <div class="rounded-md border border-border bg-panel px-5 py-4">
                <h3 class="text-sm font-semibold text-fg">
                  {{ item.name }}
                </h3>
                <p class="mt-0.5 text-sm text-fg-muted">
                  {{ item.description }}
                </p>
              </div>
            }
          </div>
        </section>
      }
    </div>
  </div>
</section>
