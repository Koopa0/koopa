<!-- Header -->
<section class="border-b border-zinc-800 bg-zinc-950">
  <div class="mx-auto max-w-7xl px-4 py-12 sm:px-6 lg:px-8">
    <div class="flex items-center gap-3">
      <lucide-icon [img]="WrenchIcon" [size]="28" class="text-zinc-500" />
      <div>
        <h1 class="text-3xl font-bold text-zinc-100">Uses</h1>
        <p class="mt-1 text-zinc-400">
          我的開發工具、硬體和軟體
        </p>
      </div>
    </div>
  </div>
</section>

<div class="bg-zinc-950">
  <div class="mx-auto max-w-3xl px-4 py-8 sm:px-6">
    <div class="space-y-10">
      @for (cat of categories; track cat.title) {
      <section>
        <div class="mb-4 flex items-center gap-2">
          <lucide-icon [img]="cat.icon" [size]="20" class="text-zinc-500" />
          <h2 class="text-xl font-bold text-zinc-100">{{ cat.title }}</h2>
        </div>
        <div class="space-y-3">
          @for (item of cat.items; track item.name) {
          <div
            class="rounded-sm border border-zinc-800 bg-zinc-900/50 px-5 py-4"
          >
            <h3 class="text-sm font-semibold text-zinc-100">
              {{ item.name }}
            </h3>
            <p class="mt-0.5 text-sm text-zinc-400">
              {{ item.description }}
            </p>
          </div>
          }
        </div>
      </section>
      }
    </div>
  </div>
</div>
