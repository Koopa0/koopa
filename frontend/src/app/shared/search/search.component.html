<div class="search-container">
  <!-- Search Button for Mobile/Tablet -->
  <button mat-icon-button 
          class="search-icon-btn"
          (click)="openSearchDialog()"
          matTooltip="搜尋文章 (/)">
    <mat-icon>search</mat-icon>
  </button>
  
  <!-- Search Field for Desktop -->
  <div class="search-field-desktop">
    <mat-form-field class="search-field" appearance="outline">
      <mat-icon matPrefix>search</mat-icon>
      <input 
        matInput 
        placeholder="搜尋文章... (/)" 
        [(ngModel)]="searchQuery"
        (ngModelChange)="onSearchInput($event)"
        autocomplete="off">
      @if (searchQuery()) {
        <button mat-icon-button matSuffix (click)="clearSearch()">
          <mat-icon>close</mat-icon>
        </button>
      }
    </mat-form-field>
    
    <!-- Search Results Dropdown -->
    @if (showResults()) {
      <div class="search-dropdown">
        @if (isSearching()) {
          <div class="search-loading">
            <mat-spinner diameter="20"></mat-spinner>
            <span>搜尋中...</span>
          </div>
        } @else if (!hasResults()) {
          <div class="no-results">
            <mat-icon>search_off</mat-icon>
            <p>找不到符合的文章</p>
          </div>
        } @else {
          <div class="results-list">
            @for (result of results() | slice:0:5; track result.article.id) {
              <a [routerLink]="['/articles', result.article.id]" 
                 class="result-item"
                 (click)="clearSearch()">
                <h4 [innerHTML]="result.highlights.title || result.article.title"></h4>
                @if (result.highlights.content) {
                  <p [innerHTML]="result.highlights.content"></p>
                }
              </a>
            }
            @if (results().length > 5) {
              <button mat-button 
                      class="view-all-btn" 
                      (click)="openSearchDialog()">
                查看全部 {{ results().length }} 個結果
              </button>
            }
          </div>
        }
      </div>
    }
  </div>
</div>
