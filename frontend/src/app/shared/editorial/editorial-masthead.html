<header class="ed-mast">
  <div class="ed-mast-row">
    <a routerLink="/" class="ed-mast-brand" aria-label="koopa0.dev home">
      <img src="/logo.png" alt="" class="ed-mast-mark" aria-hidden="true" />
      <span class="ed-mast-stack">
        <span class="ed-wordmark">koopa0<span class="tld">.dev</span></span>
        <span class="ed-letterhead">written &amp; maintained by one person</span>
      </span>
    </a>

    <nav class="ed-nav" aria-label="Main navigation">
      <a
        routerLink="/"
        [attr.data-active]="articleActive()"
        [attr.aria-current]="articleActive() ? 'page' : null"
        >Article</a
      >
    </nav>

    <span class="ed-mast-sp"></span>

    <button
      type="button"
      class="ed-search"
      (click)="commandPalette.open()"
      aria-label="Search (⌘K)"
      data-testid="ed-search"
    >
      <span>Search</span>
      <span class="ed-kbd">⌘K</span>
    </button>

    <app-theme-toggle />

    <a
      href="https://github.com/koopa0"
      target="_blank"
      rel="noopener noreferrer"
      class="ed-iconbtn"
      aria-label="GitHub"
    >
      <lucide-icon [img]="GithubIcon" [size]="16" [strokeWidth]="1.6" />
    </a>

    @if (isAuthenticated()) {
      <a
        routerLink="/admin"
        class="ed-iconbtn"
        aria-label="Admin dashboard"
      >
        <lucide-icon [img]="DashboardIcon" [size]="16" [strokeWidth]="1.6" />
      </a>
      <button
        type="button"
        class="ed-iconbtn"
        (click)="logout()"
        aria-label="Sign out"
      >
        <lucide-icon [img]="LogOutIcon" [size]="16" [strokeWidth]="1.6" />
      </button>
    }
  </div>
</header>
