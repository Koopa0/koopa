<header class="ed-mast">
  <a routerLink="/" class="ed-mast-brand" aria-label="koopa0.dev home">
    <img src="/logo.png" alt="" class="ed-mast-mark" aria-hidden="true" />
    <span class="ed-mast-stack">
      <span class="ed-wordmark">koopa0<span class="tld">.dev</span></span>
      <span class="ed-letterhead">written &amp; maintained by one person</span>
    </span>
  </a>

  <nav class="ed-nav" aria-label="Main navigation">
    <a
      routerLink="/"
      [attr.data-active]="homeActive()"
      [attr.aria-current]="homeActive() ? 'page' : null"
      >Home</a
    >
    <a
      routerLink="/articles"
      [attr.data-active]="articlesActive()"
      [attr.aria-current]="articlesActive() ? 'page' : null"
      >Articles</a
    >
    <a
      routerLink="/about"
      [attr.data-active]="aboutActive()"
      [attr.aria-current]="aboutActive() ? 'page' : null"
      >About</a
    >
  </nav>

  <div class="ed-mast-utils">
    <app-theme-toggle />

    @if (isAuthenticated()) {
      <a routerLink="/admin" class="ed-iconbtn" aria-label="Admin dashboard">
        <lucide-icon [img]="DashboardIcon" [size]="16" [strokeWidth]="1.6" />
      </a>
      <button
        type="button"
        class="ed-iconbtn"
        (click)="logout()"
        aria-label="Sign out"
      >
        <lucide-icon [img]="LogOutIcon" [size]="16" [strokeWidth]="1.6" />
      </button>
    }
  </div>
</header>
