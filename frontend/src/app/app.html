<!-- Skip to main content (WCAG 2.4.1) -->
@if (!isChromeless()) {
  <a
    href="#main-content"
    class="sr-only focus:not-sr-only focus:fixed focus:left-4 focus:top-4 focus:z-[100] focus:rounded-xs focus:bg-panel focus:px-4 focus:py-2 focus:text-sm focus:font-semibold focus:text-fg focus:shadow-lg"
  >
    Skip to content
  </a>
}

@if (isPublicSite()) {
  <!-- Public reading site — the editorial Tone B frame. -->
  <div class="ed flex min-h-dvh flex-1 flex-col" data-tone="b">
    <app-editorial-masthead />
    <main
      id="main-content"
      class="flex-1"
      style="view-transition-name: page-content"
    >
      <router-outlet />
    </main>
    <app-editorial-footer />
  </div>
} @else if (isAdminArea()) {
  <!-- Admin area — carries its own shell (sidebar + topbar). -->
  <main
    id="main-content"
    class="flex flex-1 flex-col"
    style="view-transition-name: page-content"
  >
    <router-outlet />
  </main>
} @else {
  <!-- Chrome-less preview column for the admin publish-preview iframe. -->
  <main
    id="main-content"
    class="flex-1"
    style="view-transition-name: page-content"
  >
    <router-outlet />
  </main>
}

@if (!isChromeless()) {
  <!-- Back to Top Button -->
  <app-back-to-top />

  <!-- Global aria-live region — KeyboardShortcutsService writes mode-switch
     and a11y-mode announcements here so we don't pull in CDK A11y. -->
  <div id="koopa-announcer" role="status" aria-live="polite" class="sr-only"></div>

  <!-- Command Palette (⌘K) -->
  <app-command-palette />

  <!-- Global Toast Notifications -->
  <app-toast />
}
