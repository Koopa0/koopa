<section class="mx-auto max-w-5xl px-4 py-8 sm:px-6 lg:px-8">
  <!-- 頁面標題 -->
  <div class="mb-8">
    <h1 class="text-xl font-semibold text-zinc-100">Pipeline 控制台</h1>
    <p class="mt-1 text-sm text-zinc-500">手動觸發各種 pipeline 操作</p>
  </div>

  <!-- 常用 -->
  <div class="mb-8">
    <h2 class="mb-4 text-sm font-medium uppercase tracking-wider text-zinc-400">常用</h2>
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      @for (card of commonCards; track card.action) {
        <div class="rounded-sm border border-zinc-800 bg-zinc-900/50 p-4">
          <div class="mb-3 flex items-center gap-2">
            <lucide-icon [img]="card.icon" [size]="18" class="text-zinc-300" />
            <span class="text-sm font-medium text-zinc-100">{{ card.name }}</span>
          </div>
          <p class="mb-4 text-xs text-zinc-500">{{ card.desc }}</p>
          <button
            type="button"
            class="inline-flex items-center gap-1.5 rounded-sm bg-zinc-800 px-3 py-1.5 text-xs text-zinc-300 transition-colors hover:bg-zinc-700 disabled:cursor-not-allowed disabled:opacity-50"
            [disabled]="triggering() !== null"
            (click)="runAction(card)"
          >
            @if (triggering() === card.action) {
              <lucide-icon [img]="Loader2Icon" [size]="14" class="animate-spin" />
              執行中...
            } @else {
              ▶ Run
            }
          </button>
        </div>
      }
    </div>
  </div>

  <!-- 進階 -->
  <div>
    <h2 class="mb-4 text-sm font-medium uppercase tracking-wider text-zinc-400">進階</h2>
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      @for (card of advancedCards; track card.action) {
        <div class="rounded-sm border border-zinc-800 bg-zinc-900/50 p-4">
          <div class="mb-3 flex items-center gap-2">
            <lucide-icon [img]="card.icon" [size]="18" class="text-zinc-300" />
            <span class="text-sm font-medium text-zinc-100">{{ card.name }}</span>
          </div>
          <p class="mb-4 text-xs text-zinc-500">{{ card.desc }}</p>
          <button
            type="button"
            class="inline-flex items-center gap-1.5 rounded-sm bg-zinc-800 px-3 py-1.5 text-xs text-zinc-300 transition-colors hover:bg-zinc-700 disabled:cursor-not-allowed disabled:opacity-50"
            [disabled]="triggering() !== null"
            (click)="runAction(card)"
          >
            @if (triggering() === card.action) {
              <lucide-icon [img]="Loader2Icon" [size]="14" class="animate-spin" />
              執行中...
            } @else {
              ▶ Run
            }
          </button>
        </div>
      }
    </div>
  </div>
</section>
