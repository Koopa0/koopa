<form class="flex items-center gap-2" (ngSubmit)="submit()">
  <div class="relative flex-1">
    <input
      type="text"
      class="w-full rounded-sm border border-zinc-700 bg-zinc-900 px-3 py-2 text-sm text-zinc-100 placeholder-zinc-500 transition-colors focus:border-zinc-500 focus:outline-hidden"
      placeholder="快速捕獲想法..."
      [ngModel]="text()"
      (ngModelChange)="text.set($event)"
      name="captureText"
    />
  </div>
  <button
    type="submit"
    class="inline-flex shrink-0 items-center gap-1.5 rounded-sm bg-zinc-800 px-3 py-2 text-sm text-zinc-300 transition-colors hover:bg-zinc-700 hover:text-zinc-100 disabled:opacity-50"
    [disabled]="text().trim().length === 0"
  >
    <lucide-icon [img]="PlusIcon" [size]="14" />
    捕獲
  </button>
</form>
