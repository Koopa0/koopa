<ol class="pt-0.5 pb-1.5" data-testid="lifecycle-steps">
  @for (step of steps(); track step.status; let last = $last) {
    <li class="relative flex items-center gap-[11px] py-1.5">
      @if (!last) {
        <span
          class="absolute left-2 top-[26px] h-3.5 w-0.5"
          [class]="step.state === 'done' ? 'bg-success' : 'bg-border'"
          aria-hidden="true"
        ></span>
      }
      <span
        class="z-10 grid size-[18px] shrink-0 place-items-center rounded-full border-2"
        [class]="
          step.state === 'done'
            ? 'border-success bg-success'
            : step.state === 'active'
              ? 'border-brand bg-panel shadow-[0_0_0_3px_var(--brand-faint)]'
              : 'border-border-strong bg-panel'
        "
        aria-hidden="true"
      >
        @if (step.state === 'done') {
          <span class="text-[10px] leading-none text-[oklch(0.16_0.02_260)]">✓</span>
        } @else if (step.state === 'active') {
          <span class="size-[7px] rounded-full bg-brand"></span>
        }
      </span>
      <span
        class="font-mono text-[13px]"
        [class]="
          step.state === 'done'
            ? 'text-fg-muted'
            : step.state === 'active'
              ? 'font-medium text-fg'
              : 'text-fg-subtle'
        "
        [attr.data-testid]="'lifecycle-step-' + step.status"
        [attr.aria-current]="step.state === 'active' ? 'step' : null"
      >
        {{ step.status }}
      </span>
    </li>
  }
</ol>

<div class="mt-3 flex flex-wrap gap-2" data-testid="lifecycle-actions">
  @for (act of actions(); track act.id) {
    <button
      type="button"
      (click)="run(act.id)"
      [disabled]="busy()"
      class="inline-flex items-center gap-1.5 rounded-sm border px-[11px] py-[5px] text-xs transition-colors disabled:cursor-not-allowed disabled:opacity-40"
      [class]="
        act.primary
          ? 'border-brand bg-brand font-semibold text-[oklch(0.14_0.02_260)] hover:bg-brand-strong'
          : 'border-border bg-elevated text-fg-muted hover:bg-overlay hover:text-fg'
      "
      [attr.data-testid]="'lifecycle-action-' + act.id"
    >
      {{ act.label }}
    </button>
  }
</div>

@if (showPublishGate()) {
  <p
    class="mt-2 font-mono text-[10px] uppercase tracking-[0.05em] text-warn"
    data-testid="lifecycle-publish-gate"
  >
    publish = human only
  </p>
}
