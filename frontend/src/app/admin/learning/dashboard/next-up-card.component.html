<section
  class="rounded-md border border-border bg-panel p-4"
  data-testid="next-up-card"
>
  <div class="mb-3 flex items-center justify-between">
    <h3 class="font-display text-sm font-semibold text-fg">Next up</h3>
    <span class="font-mono text-[10px] tracking-[0.06em] text-fg-faint uppercase">
      Practice
    </span>
  </div>

  @if (isLoading()) {
    <div class="h-12 animate-pulse rounded-sm bg-elevated" data-testid="next-up-loading"></div>
  } @else if (hasError()) {
    <div class="flex items-center justify-between gap-3" data-testid="next-up-error">
      <p class="text-[13px] text-fg-muted">Couldn't load a recommendation.</p>
      <button
        type="button"
        (click)="reload()"
        class="rounded-sm border border-border bg-elevated px-2.5 py-1 text-xs text-fg-muted transition-colors hover:text-fg"
      >
        Retry
      </button>
    </div>
  } @else if (hasTarget()) {
    <div class="flex items-start justify-between gap-4" data-testid="next-up-target">
      <div class="min-w-0">
        <p class="truncate font-display text-base font-semibold text-fg">
          {{ target()?.concept_name }}
        </p>
        <p class="mt-1 text-[13px] leading-snug text-fg-muted">
          {{ target()?.reason }}
        </p>
      </div>
      <button
        type="button"
        (click)="startSession()"
        [disabled]="starting()"
        data-testid="next-up-start"
        class="shrink-0 rounded-sm bg-brand px-3 py-1.5 text-xs font-medium text-[oklch(0.12_0.02_260)] transition-colors hover:bg-brand-strong disabled:opacity-40"
      >
        {{ starting() ? 'Starting…' : 'Start session' }}
      </button>
    </div>
  } @else {
    <p class="text-[13px] text-fg-subtle" data-testid="next-up-empty">
      {{ target()?.reason ?? 'Nothing to recommend yet.' }}
    </p>
  }
</section>
