<!-- Shell: 220px nav rail + (Topbar + router-outlet) -->
<div class="flex min-h-0 flex-1">
  @if (drawerOpen()) {
    <div
      class="fixed inset-0 z-40 bg-black/60 md:hidden"
      aria-hidden="true"
      (click)="closeDrawer()"
      data-testid="admin-drawer-backdrop"
    ></div>
  }
  <aside
    id="admin-drawer"
    class="fixed inset-y-0 left-0 z-50 flex w-[220px] shrink-0 flex-col border-r border-border bg-panel py-3.5 transition-transform duration-200 md:static md:z-auto md:translate-x-0 md:transition-none"
    [class.translate-x-0]="drawerOpen()"
    [class.-translate-x-full]="!drawerOpen()"
    [cdkTrapFocus]="drawerOpen() && isMobile()"
    role="navigation"
    aria-label="Admin navigation"
  >
    <!-- Brand -->
    <div
      class="mx-2.5 flex items-center gap-2.5 px-2 pb-4 pt-1"
      data-testid="admin-nav-brand"
    >
      <img
        src="/logo.png"
        alt=""
        class="size-6 rounded-xs"
        aria-hidden="true"
      />
      <div class="min-w-0">
        <div class="truncate font-display text-sm font-semibold text-fg">
          koopa0.admin
        </div>
        <div class="font-mono text-[10px] text-fg-subtle">local · dark</div>
      </div>
    </div>

    <!-- Nav groups -->
    <nav class="flex-1 overflow-y-auto px-2.5 pb-2">
      @for (group of navGroups; track group.label) {
      <div
        class="px-2 pb-1 pt-3 font-mono text-[10px] uppercase tracking-[0.08em] text-fg-faint"
      >
        {{ group.label }}
      </div>
      @for (item of group.items; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-brand-muted text-brand"
        [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
        #rla="routerLinkActive"
        class="group relative flex items-center gap-[9px] rounded-xs px-2 py-[5px] text-[13px] text-fg-muted no-underline transition-colors hover:bg-overlay hover:text-fg"
        [attr.aria-current]="rla.isActive ? 'page' : null"
        [attr.title]="
              item.shortcutHint
                ? item.label + ' — press ' + item.shortcutHint
                : item.label
            "
        [attr.data-testid]="item.testId"
      >
        @if (rla.isActive) {
        <span
          class="absolute -left-2.5 bottom-1.5 top-1.5 w-0.5 rounded-[2px] bg-brand"
          aria-hidden="true"
          data-testid="admin-nav-active-bar"
        ></span>
        }
        <lucide-icon [img]="item.icon" [size]="14" />
        <span class="truncate">{{ item.label }}</span>
        @let count = countFor(item); @if (count !== null) {
        <span
          class="ml-auto font-mono text-[10px] tabular-nums text-fg-faint"
          data-testid="admin-nav-count"
        >
          {{ count }}
        </span>
        }
      </a>
      } }
    </nav>

    <!-- Bottom: user summary -->
    <div class="mx-2.5">
      <div
        class="mt-2 flex items-center gap-2.5 border-t border-border px-2 py-2"
        data-testid="admin-nav-user"
      >
        <div class="min-w-0 flex-1">
          <div
            class="flex items-center gap-[5px] font-mono text-[10px] text-fg-subtle"
          >
            <span
              class="inline-block size-[5px] rounded-full bg-success"
              aria-hidden="true"
            ></span>
            <span>agents available</span>
          </div>
        </div>

        <button
          type="button"
          (click)="toggleA11yMode()"
          class="grid size-7 place-items-center rounded-xs transition-colors hover:bg-overlay"
          [class.text-success]="a11yMode()"
          [class.text-fg-subtle]="!a11yMode()"
          [attr.aria-label]="
            a11yMode()
              ? 'Disable accessibility mode (single-character shortcuts active)'
              : 'Enable accessibility mode (disables single-character shortcuts)'
          "
          [attr.aria-pressed]="a11yMode()"
          data-testid="admin-a11y-toggle"
        >
          <lucide-icon [img]="AccessibilityIcon" [size]="14" />
        </button>
        <button
          type="button"
          (click)="logout()"
          class="grid size-7 place-items-center rounded-xs text-fg-subtle transition-colors hover:bg-overlay hover:text-error"
          aria-label="Sign out"
          data-testid="admin-logout"
        >
          <lucide-icon [img]="LogOutIcon" [size]="14" />
        </button>
      </div>
    </div>
  </aside>

  <!-- Content column: Topbar + main -->
  <div class="flex min-w-0 flex-1 flex-col">
    <app-admin-topbar />
    <main
      class="min-w-0 flex-1 overflow-y-auto"
      style="view-transition-name: admin-page-content"
    >
      <router-outlet />
    </main>
  </div>
</div>

<app-toast />
