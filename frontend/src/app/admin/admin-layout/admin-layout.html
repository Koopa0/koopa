<!-- Status Ribbon — Day 6-7 wires it to /api/admin/system/ribbon -->
<header
  class="flex h-10 shrink-0 items-center gap-3 border-b border-zinc-800 bg-zinc-950 px-4 font-mono text-xs text-zinc-500"
  data-testid="admin-status-ribbon"
  role="status"
  aria-label="System status ribbon"
>
  <span class="text-zinc-300">◉ koopa0 admin</span>
  <span class="text-zinc-700">·</span>
  <span class="text-zinc-600">ribbon arrives Day 6-7</span>
</header>

<!-- Shell: left rail + content -->
<div class="flex min-h-0 flex-1">
  <!-- Left rail: 2 mode icons + sign out -->
  <aside
    class="flex w-14 shrink-0 flex-col border-r border-zinc-800 bg-zinc-950"
    role="navigation"
    aria-label="Admin mode navigation"
  >
    <nav class="flex flex-1 flex-col items-center gap-1 py-3">
      @for (mode of modes; track mode.route) {
      <a
        [routerLink]="mode.route"
        routerLinkActive="bg-zinc-800/80 text-white"
        class="group relative flex size-10 items-center justify-center rounded-sm text-zinc-400 no-underline transition-colors hover:bg-zinc-800/50 hover:text-zinc-200"
        [attr.aria-label]="
            mode.label + ' mode (shortcut ' + mode.shortcut + ')'
          "
        [attr.data-testid]="'mode-' + mode.label.toLowerCase()"
      >
        <lucide-icon [img]="mode.icon" [size]="18" />
        <span
          class="pointer-events-none absolute left-12 z-10 hidden whitespace-nowrap rounded-sm border border-zinc-700 bg-zinc-900 px-2 py-1 text-xs text-zinc-300 group-hover:block"
        >
          {{ mode.label }}
          <kbd
            class="ml-1 rounded-xs border border-zinc-700 bg-zinc-800 px-1 font-mono text-zinc-500"
            >{{ mode.shortcut }}</kbd
          >
        </span>
      </a>
      }
    </nav>

    <div class="flex flex-col items-center gap-1 border-t border-zinc-800 p-2">
      <button
        type="button"
        (click)="toggleA11yMode()"
        class="flex size-10 items-center justify-center rounded-sm transition-colors hover:bg-zinc-800/50"
        [class.text-emerald-400]="a11yMode()"
        [class.text-zinc-500]="!a11yMode()"
        [attr.aria-label]="
          a11yMode()
            ? 'Disable accessibility mode (single-character shortcuts active)'
            : 'Enable accessibility mode (disables single-character shortcuts)'
        "
        [attr.aria-pressed]="a11yMode()"
        data-testid="admin-a11y-toggle"
      >
        <lucide-icon [img]="AccessibilityIcon" [size]="18" />
      </button>
      <button
        type="button"
        (click)="logout()"
        class="flex size-10 items-center justify-center rounded-sm text-zinc-500 transition-colors hover:bg-zinc-800/50 hover:text-red-400"
        aria-label="Sign out"
        data-testid="admin-logout"
      >
        <lucide-icon [img]="LogOutIcon" [size]="18" />
      </button>
    </div>
  </aside>

  <!-- Main content area -->
  <main
    class="min-w-0 flex-1 overflow-y-auto"
    style="view-transition-name: page-content"
  >
    <router-outlet />
  </main>
</div>

<app-toast />
<app-inspector-panel />
