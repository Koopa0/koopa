services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '127.0.0.1:4000:4000'
    environment:
      - NODE_ENV=production
      - PORT=4000
      - SITE_URL=https://koopa0.dev
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - internal
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: blog
      POSTGRES_USER: koopa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koopa -d blog"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://koopa:${POSTGRES_PASSWORD:-changeme}@postgres:5432/blog?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: https://koopa0.dev
      SITE_URL: https://koopa0.dev
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET:-blog}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NOTION_API_KEY: ${NOTION_API_KEY}
      NOTION_WEBHOOK_SECRET: ${NOTION_WEBHOOK_SECRET}
      NOTION_PROJECTS_DB: ${NOTION_PROJECTS_DB}
      NOTION_TASKS_DB: ${NOTION_TASKS_DB}
      NOTION_BOOKS_DB: ${NOTION_BOOKS_DB}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_REPO: ${GITHUB_REPO:-Koopa0/obsidian}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

volumes:
  pgdata:

networks:
  internal:
